<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="keywords" content="始祖会,関東,GPZ1000RX,ZXT00A,ZX10,ZXT00B,KAWASAKI,オフ会,ミーティング,鯨,鯱" />
    <meta name="author" content="始祖会 Kanto Owners Meeting">
    
    <!-- Load remaining fonts after page load to avoid blocking -->
    <script>
    window.addEventListener('load', function() {
      const link = document.createElement('link');
      link.href = 'https://fonts.googleapis.com/icon?family=Material+Icons&display=swap';
      link.rel = 'stylesheet';
      document.head.appendChild(link);
    });
    </script>
    <!-- Google Analytics with enhanced optimization -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com">
    <link rel="preconnect" href="https://www.google-analytics.com">
    <script>
      // Load Google Analytics only after user interaction or 4s delay
      let analyticsLoaded = false;
      
      function loadAnalytics() {
        if (analyticsLoaded) return;
        analyticsLoaded = true;
        
        const script = document.createElement('script');
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-ERGNMWNJL1';
        script.async = true;
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-ERGNMWNJL1', {
          'send_page_view': true,
          'anonymize_ip': true
        });
      }
      
      // Load on first user interaction
      ['click', 'scroll', 'keydown', 'touchstart'].forEach(event => {
        document.addEventListener(event, loadAnalytics, { once: true, passive: true });
      });
      
      // Fallback: load after 4 seconds if no interaction
      setTimeout(loadAnalytics, 4000);
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
